## FQ_GW_SNIa.yml
# ezmc configuration file for FQ_GW_SNIa.stan

# The names of the parameters defined in the .stan model file.
names: [h, Omega_m, M]

# The labels to show in the plots and tables, for each parameter.
# Latex is supported.
labels: [h, \Omega_m, M]

# Initial condition for each parameter, for each chain.
# This will run an arbitrary Python command (so be careful!).
# The most relevant initial conditions implemented in this program are:
# - gauss(mu, sigma)
# - uniform(a, b)
# - float(a)
initial:
  h: gauss(0.7, 0.15)
  Omega_m: gauss(0.284, 0.1)
  M: uniform(-2*6**0.5, 10)

# Line markers to show rendered in the plots.
# These are optional and can be used to represent the true or expected values.
markers:
  h: 0.7
  Omega_m: 0.284
  M: 0

# Number of steps to sample the posterior distribution, after the warmup.
samples: 2000

# Number of steps to warmup each chain.
# These samples will be discarded.
warmup: 100

# Number of chains to run.
# Leave empty for a single chain.
# Will run in parallel, provided that there are enough threads to do so.
# Keep in mind that each chain will do a total number of steps = warmup + samples.
chains: 4
